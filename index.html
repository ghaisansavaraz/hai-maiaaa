  <meta name="color-scheme" content="dark" />

  <!-- black/white flower favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>⚘</text></svg>">

  <!-- SF Pro / system stack (no external download) -->
        <style>
          /* Apple system font stack */
          :root { 
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, system-ui, sans-serif;
            --font-mono: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
          }
          html,body { height:100%; margin:0; }

  <link rel="stylesheet" href="css/animations.css" />

  <body>
    <!-- Moon icon (top-right, fixed) -->
    <div id="moonIconContainer" aria-hidden="true">
      <svg id="moonSvg" viewBox="0 0 100 100" aria-label="Moon phase">
        <defs>
          <!-- Mask selects ONLY the unlit region for the shadow overlay -->
          <mask id="unlitMask">
            <rect width="100" height="100" fill="black"/>
            <!-- Potential unlit area: full disc -->
            <circle id="unlitDisc" cx="50" cy="50" r="48" fill="white"/>
            <!-- Cut out the lit crescent/hemisphere by offsetting this disc -->
            <circle id="litCutout" cx="50" cy="50" r="48" fill="black"/>
          </mask>
        </defs>
        <!-- Base texture stays fully visible so details are preserved -->
        <image id="moonTex" href="https://svs.gsfc.nasa.gov/vis/a000000/a004700/a004708/frames/730x730_1x1_30p/moon.0001.jpg" x="0" y="0" width="100" height="100"/>
        <!-- Semi‑transparent shadow only over unlit region (opacity tuned to ~0.6–0.7) -->
        <g id="shadowOverlay" mask="url(#unlitMask)">
          <circle id="shadowOverlayCircle" cx="50" cy="50" r="48" fill="black" opacity="0.65"/>
        </g>
        <!-- Optional subtle rim -->
        <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,.08)"/>
      </svg>
    </div>

    <!-- Day mode particles (clouds and light rays) -->
    <div class="day-particles-container">
      <!-- Soft floating clouds -->
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="cloud cloud-4"></div>
      <div class="cloud cloud-5"></div>
      <div class="cloud cloud-6"></div>
      
      <!-- Subtle light rays -->

      <div class="light-ray ray-2"></div>
      <div class="light-ray ray-3"></div>
      <div class="light-ray ray-4"></div>
    </div>

    <!-- Milky Way band -->
    <div class="milky-way"></div>
    
    <!-- Multi-layer stars -->
    <div class="stars-layer stars-layer-back"></div>
    <div class="stars-layer stars-layer-mid"></div>
    <div class="stars-layer stars-layer-front"></div>

    <!-- Star Clusters -->

  <!-- central area -->
  <div id="center" class="center dashboard-active">
    <main id="dashboard" class="dashboard visible" aria-hidden="false">
      <!-- Main dashboard content -->
      <div id="dashboardContent" class="dashboard-content visible">
        
        <!-- Header with Clock -->
        <header class="dashboard-header">
          <div class="header-clock">
            <div class="header-time-container">
              <div id="headerCurrentTime" class="header-current-time">--:--:--</div>
              <div id="headerCurrentDate" class="header-current-date">Loading...</div>
            </div>
            <div id="headerTimeGreeting" class="header-time-greeting">
              <span id="moonPhaseLabel" class="moon-phase-label">—</span>
              <span class="separator-dot" aria-hidden="true">•</span>
              <span id="greetingText">Good morning Maiaaa</span>
            </div>
          </div>
        </header>

        <!-- Main Grid Layout -->
        <div class="dashboard-grid">
          
          <!-- Left Column -->
          <div class="dashboard-column">
            
            <!-- Mood Section -->
            <section id="moodSection" class="dashboard-card">
              <div class="card-header">
                <h2 class="card-title">Mood</h2>
                <div class="card-subtitle">How are you feeling today?</div>
                <button id="clearMood" class="btn-trash" aria-label="Delete moods" title="Delete moods">
                  <img src="data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 32 32'%3e%3cpath fill='white' d='M27 6.25H5a.75.75 0 0 0 0 1.5h1.25V26A1.75 1.75 0 0 0 8 27.75h16A1.75 1.75 0 0 0 25.75 26V7.75H27a.75.75 0 1 0 0-1.5M24.25 26a.25.25 0 0 1-.25.25H8a.25.25 0 0 1-.25-.25V7.75h16.5zm-14-23a.75.75 0 0 1 .75-.75h10a.75.75 0 1 1 0 1.5H11a.75.75 0 0 1-.75-.75'/%3e%3c/svg%3e" alt="" width="20" height="20" class="icon-trash" />
                </button>
              </div>
              <div class="card-content">
                
                <!-- Mood Input -->
                <div class="mood-input-container">
                  <input id="moodInput" class="mood-input" type="text" placeholder="How are you feeling?" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
                  
                  <!-- Category Buttons -->
                  <div class="mood-categories">
                    <button class="mood-category happy" data-category="Happy" disabled>Happy</button>
                    <button class="mood-category calm" data-category="Calm" disabled>Calm</button>
                    <button class="mood-category tired" data-category="Tired" disabled>Tired</button>
                    <button class="mood-category sad" data-category="Sad" disabled>Sad</button>
                  </div>
                  
                  <div id="moodTags" class="mood-tags"></div>
                </div>
                
                <!-- Mood Analytics -->
                <div id="moodAnalytics" class="mood-analytics">
                  <div class="mood-stat mood-stat-most">Most felt today: <span>—</span></div>
                  <div class="mood-stat mood-stat-range">Today's range: <span>—</span></div>
                </div>
                
              </div>
            </section>

            <!-- Tasks Section -->
            <section id="tasksSection" class="dashboard-card">
              <div class="card-header">
                <h2 class="card-title">Tasks</h2>
                <div class="card-subtitle">Maia's affairs</div>
                <button id="clearTasks" class="btn-trash" aria-label="Delete tasks" title="Delete tasks">
                  <img src="data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 32 32'%3e%3cpath fill='white' d='M27 6.25H5a.75.75 0 0 0 0 1.5h1.25V26A1.75 1.75 0 0 0 8 27.75h16A1.75 1.75 0 0 0 25.75 26V7.75H27a.75.75 0 1 0 0-1.5M24.25 26a.25.25 0 0 1-.25.25H8a.25.25 0 0 1-.25-.25V7.75h16.5zm-14-23a.75.75 0 0 1 .75-.75h10a.75.75 0 1 1 0 1.5H11a.75.75 0 0 1-.75-.75'/%3e%3c/svg%3e" alt="" width="20" height="20" class="icon-trash" />
                </button>
              </div>
              <div class="card-content">
                <div class="task-controls">
                  <input id="taskText" class="task-input" type="text" placeholder="What's my Maia about to do?" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
                  <div class="deadline-controls">
                    <input id="taskDeadlineDate" class="deadline-date" type="date" autocomplete="off" />
                    <input id="taskDeadlineTime" class="deadline-time" type="time" autocomplete="off" />
                  </div>
                  <button id="addTask" class="btn-primary">Add Task</button>
                </div>
                <div id="tasksContainer" class="tasks-container"></div>
              </div>
            </section>

          </div>

          <!-- Right Column -->
          <div class="dashboard-column">
            
            <!-- Reminders Section -->
            <section id="remindersSection" class="dashboard-card">
              <div class="card-header">
                <h2 class="card-title">Reminders</h2>
                <div class="card-subtitle">Important notes</div>
              </div>
              <div class="card-content">
                <div class="reminder-controls">
                  <input id="reminderText" class="reminder-input" type="text" placeholder="Write a reminder..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
                  <button id="addReminder" class="btn-primary">Add</button>
                </div>
                <div id="reminderList" class="reminder-cards" aria-live="polite"></div>
              </div>
            </section>

            <!-- Letters Section -->
            <section id="lettersSection" class="dashboard-card">
              <div class="card-header">
                <h2 class="card-title">Letters</h2>
                <div class="card-subtitle">Messages from Gesan</div>
              </div>
              <div class="card-content">
                <div class="coming-soon">
                  <div class="coming-soon-icon">?</div>
                  <div class="coming-soon-text">Coming Soon</div>
                </div>
              </div>
            </section>

          </div>

        </div>
